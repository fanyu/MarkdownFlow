name: MarkdownPreview
options:
  bundleIdPrefix: com.fanyu
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""

targets:
  MarkdownPreviewApp:
    type: application
    platform: macOS
    sources:
      - path: MarkdownPreviewApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanyu.MarkdownPreviewApp
        INFOPLIST_FILE: MarkdownPreviewApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkdownPreviewApp/MarkdownPreviewApp.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: MarkdownPreviewExtension
        embed: true
        link: false

  MarkdownPreviewExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MarkdownPreviewExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanyu.MarkdownPreviewApp.MarkdownPreviewExtension
        INFOPLIST_FILE: MarkdownPreviewExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkdownPreviewExtension/MarkdownPreviewExtension.entitlements
        CODE_SIGN_STYLE: Automatic
