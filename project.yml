name: MarkdownFlow
options:
  bundleIdPrefix: com.fanyu
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: K52WP93HZU

targets:
  MarkdownFlow:
    type: application
    platform: macOS
    sources:
      - path: MarkdownFlowApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanyu.MarkdownFlow
        INFOPLIST_FILE: MarkdownFlowApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkdownFlowApp/MarkdownFlowApp.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: MarkdownFlowExtension
        embed: true
        link: false

  MarkdownFlowExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MarkdownFlowExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanyu.MarkdownFlow.Extension
        INFOPLIST_FILE: MarkdownFlowExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: MarkdownFlowExtension/MarkdownFlowExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        # XcodeKit lives in Xcode's Developer frameworks, not the SDK
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(DEVELOPER_FRAMEWORKS_DIR)
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - $(DEVELOPER_FRAMEWORKS_DIR)
        OTHER_LDFLAGS:
          - $(inherited)
          - -weak_framework
          - XcodeKit
